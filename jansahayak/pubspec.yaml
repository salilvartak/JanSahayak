name: jansahayak
description: "JanSahayak – visual annotation assistant for every user."
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2

  # ── Networking ───────────────────────────────────────────────────────────────
  dio: ^5.7.0

  # ── Image ────────────────────────────────────────────────────────────────────
  cached_network_image: ^3.4.1

  # ── Persistence ──────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.3

  # ── Device ID ────────────────────────────────────────────────────────────────
  uuid: ^4.5.1
  device_info_plus: ^12.4.0
  android_id: ^0.4.0

  # ── Voice input ──────────────────────────────────────────────────────────────
  record: ^6.0.0
  path_provider: ^2.1.5
  http: ^1.2.0
  flutter_dotenv: ^5.1.0

  # ── Text-to-speech (reads Gemini explanation aloud) ──────────────────────────
  flutter_tts: ^4.2.1

  # ── Permissions ──────────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Animations ───────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  audioplayers: ^6.6.0
  tutorial_coach_mark: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Images/Jansahayak_logo.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/sounds/
    - assets/Images/
